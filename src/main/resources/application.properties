# Spring Boot Application Configuration
spring.application.name=prompt-optimizer

# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/

# Database Configuration (H2 in-memory local test database)
spring.datasource.url=jdbc:h2:mem:prompt_optimizer;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.datasource.url=jdbc:mysql://localhost:3306/promptdb
spring.datasource.username=root
spring.datasource.password=yourpassword

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.promptoptimizer=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# OpenAI API Key
openai.api.key=sk-REPLACE-WITH-YOUR-NEW-KEY

logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# OpenAI API Key
openai.api.key=sk-prompt-optimizer-backend-REPLACE-WITH-YOUR-NEW-KEY
